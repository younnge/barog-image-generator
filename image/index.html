<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src https://fonts.gstatic.com https://fastly.jsdelivr.net https://cdn.jsdelivr.net; img-src 'self' data: blob:; base-uri 'self'; form-action 'none'">
    <title>원내이미지 생성기</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
        integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"
        integrity="sha512-Qlv6VSKh1gDKGoJbnyA5RMXYcvnpIqhO++MhIM2fStMcGT9i2T//tSwYFlcyoRRDcDZ+TYHpH8azBBCyhpSeqw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="style.css?v=20260623h">
</head>
<body>
    <div class="bg-blur">
        <div class="blob" style="top:5%;left:5%;"></div>
        <div class="blob" style="top:65%;left:75%;width:360px;height:360px;background:var(--accent);"></div>
    </div>

    <div class="container">
        <!-- ===== 북마크 패널 ===== -->
        <div class="bookmark-panel glass-card" id="bookmarkPanel">
            <div class="bookmark-panel-head">북마크</div>
            <div class="bookmark-list" id="bookmarkList">
                <div class="bookmark-empty">항목을 추가하면<br>목차가 표시됩니다</div>
            </div>
        </div>

        <!-- ===== 좌측 입력 패널 ===== -->
        <div class="input-card glass-card">

            <!-- 카드 헤드: 타이틀 + 탭 -->
            <div class="input-card-head">
                <h1>원내이미지 생성기</h1>
                <div class="tab-bar" role="tablist" aria-label="설정 탭">
                    <button class="tab-btn active" data-tab="design" role="tab" id="tab-design" aria-selected="true" aria-controls="tabDesign">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
                        디자인 설정
                    </button>
                    <button class="tab-btn" data-tab="items" role="tab" id="tab-items" aria-selected="false" aria-controls="tabItems">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                        항목 구성
                    </button>
                </div>
            </div>

            <!-- ===== 디자인 설정 탭 ===== -->
            <div class="tab-content active" id="tabDesign" role="tabpanel" aria-labelledby="tab-design">

                <div class="design-group">
                    <div class="design-group-label">배경 이미지</div>
                    <div class="file-input-wrapper" id="dropZone">
                        <img id="bgThumb" class="bg-thumb" alt="">
                        <label class="file-label" id="fileLabel">
                            <span id="fileLabelMain">파일 선택 또는 드래그 (선택사항)</span>
                            <span id="fileLabelSub" class="file-label-sub"></span>
                        </label>
                        <input type="file" id="bgInput" accept="image/*">
                    </div>
                </div>

                <div class="design-2col">
                    <div class="design-group">
                        <div class="design-group-label">테마 색상</div>
                        <div class="color-input-row">
                            <div class="swatch-picker">
                                <div class="color-swatch" id="themeSwatch" style="background:#000000;"></div>
                                <input type="color" id="themeColor" value="#000000">
                            </div>
                            <input type="text" id="themeHex" class="btn-input hex-input" value="#000000" maxlength="7">
                        </div>
                        <div id="colorPresets" class="color-presets-wrap"></div>
                    </div>

                    <div class="design-group">
                        <div class="design-group-label">숫자 색상</div>
                        <div class="color-input-row">
                            <div class="swatch-picker">
                                <div class="color-swatch" id="numColorSwatch" style="background:#000000;"></div>
                                <input type="color" id="numColorPicker" value="#000000">
                            </div>
                            <input type="text" id="numColorHex" class="btn-input hex-input" value="#000000" maxlength="7">
                        </div>
                        <div id="numColorPresets" class="color-presets-wrap"></div>
                    </div>
                </div>

                <div class="design-2col">
                    <div class="design-group">
                        <div class="design-group-label">강조 색상 <span class="design-group-hint">서식 &lt;강조&gt; 적용 색</span></div>
                        <div class="color-input-row">
                            <div class="swatch-picker">
                                <div class="color-swatch" id="hlColorSwatch" style="background:#ffeb3b;"></div>
                                <input type="color" id="hlColorPicker" value="#ffeb3b">
                            </div>
                            <input type="text" id="hlColorHex" class="btn-input hex-input" value="#FFEB3B" maxlength="7">
                        </div>
                        <div id="hlColorPresets" class="color-presets-wrap"></div>
                    </div>

                    <div class="design-group">
                        <div class="design-group-label">단위박스 색상 <span class="design-group-hint">가격 단위 칩 배경색</span></div>
                        <div class="color-input-row">
                            <div class="swatch-picker">
                                <div class="color-swatch" id="labelBoxColorSwatch" style="background:#000000;"></div>
                                <input type="color" id="labelBoxColorPicker" value="#000000">
                            </div>
                            <input type="text" id="labelBoxColorHex" class="btn-input hex-input" value="#000000" maxlength="7">
                        </div>
                        <div id="labelBoxColorPresets" class="color-presets-wrap"></div>
                    </div>
                </div>

                <div class="design-2col">
                    <div class="design-group">
                        <div class="design-group-label">상단 텍스트 색상 <span class="design-group-hint">상단·기간 공통</span></div>
                        <div class="color-input-row">
                            <div class="swatch-picker">
                                <div class="color-swatch" id="textColorSwatch" style="background:#000000;"></div>
                                <input type="color" id="textColorPicker" value="#000000">
                            </div>
                            <input type="text" id="textColorHex" class="btn-input hex-input" value="#000000" maxlength="7">
                        </div>
                        <div id="textColorPresets" class="color-presets-wrap"></div>
                    </div>
                </div>

                <div class="design-group">
                    <div class="design-group-label">제목</div>
                    <div class="item-name-wrapper">
                        <textarea id="topText" class="btn-input auto-resize" rows="1" placeholder="예) 바로그 강남점 5월 이벤트"></textarea>
                        <div class="format-toolbar">
                            <button class="fmt-btn fmt-up" data-open="&lt;+" data-close="+&gt;" title="글자 확대">확대</button>
                            <button class="fmt-btn fmt-dn" data-open="&lt;-" data-close="-&gt;" title="글자 축소">축소</button>
                            <button class="fmt-btn fmt-bold" data-open="{" data-close="}" title="굵게">굵게</button>
                        </div>
                    </div>
                </div>

                <div class="design-2col">
                    <div class="design-group">
                        <div class="design-group-label">이벤트 기간</div>
                        <div class="item-name-wrapper">
                            <input type="text" id="periodText" class="btn-input" placeholder="예) 2026.05.01 - 2026.05.31" value="">
                            <div class="format-toolbar">
                                <button class="fmt-btn fmt-up" data-open="&lt;+" data-close="+&gt;" title="글자 확대">확대</button>
                                <button class="fmt-btn fmt-dn" data-open="&lt;-" data-close="-&gt;" title="글자 축소">축소</button>
                                <button class="fmt-btn fmt-bold" data-open="{" data-close="}" title="굵게">굵게</button>
                            </div>
                        </div>
                    </div>

                    <div class="design-group">
                        <div class="design-group-label">기간 우측 텍스트</div>
                        <div class="item-name-wrapper">
                            <input type="text" id="periodNote" class="btn-input" placeholder="예) 부가세 별도" value="">
                            <div class="format-toolbar">
                                <button class="fmt-btn fmt-up" data-open="&lt;+" data-close="+&gt;" title="글자 확대">확대</button>
                                <button class="fmt-btn fmt-dn" data-open="&lt;-" data-close="-&gt;" title="글자 축소">축소</button>
                                <button class="fmt-btn fmt-bold" data-open="{" data-close="}" title="굵게">굵게</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="design-2col">
                    <div class="design-group">
                        <div class="label-with-tip">
                            <span class="label-text">헤더 높이</span>
                            <span class="label-tip-wrap"><input type="number" id="headerHeightLabel" class="label-tip-input" min="0" max="55" step="1" value="5"><span class="label-tip-unit">%</span></span>
                        </div>
                        <input type="range" id="headerHeight" min="0" max="55" value="5" step="1" class="slider-input">
                    </div>

                    <div class="design-group" id="textScaleGroup">
                        <div class="label-with-tip">
                            <span class="label-text">전체 텍스트 크기</span>
                            <span class="label-tip-wrap"><input type="number" id="textScaleLabel" class="label-tip-input" min="70" max="150" step="1" value="100"><span class="label-tip-unit">%</span></span>
                        </div>
                        <input type="range" id="textScale" min="70" max="150" value="100" step="1" class="slider-input">
                        <label class="balance-opt" title="켜면 내용이 항상 A4 한 장에 들어가도록 글자 크기를 자동 조절합니다(슬라이더 잠금). 최소 크기로도 넘치면 항목을 줄이라고 안내합니다. 끄면 슬라이더로 직접 조절합니다.">
                            <input type="checkbox" id="autoFitOnePage" checked> 한 장에 자동 맞춤
                        </label>
                    </div>
                </div>

                <button class="btn-toggle-all btn-balance-full" id="btnBalance" aria-pressed="false" title="좌우 컬럼 높이를 자동으로 균등 배분하고 남는 간격을 균등 분배합니다">좌우 균등 맞춤</button>
                <label class="balance-opt" title="켜면 두 컬럼 하단을 페이지 끝에 정확히 맞춥니다(간격이 약간 넓어질 수 있음). 끄면 간격을 최소로 유지하고 짧은 쪽 하단에 여백이 생길 수 있습니다.">
                    <input type="checkbox" id="balanceBottomExact" checked> 상하단 정확 맞춤
                </label>

            </div>

            <!-- ===== 항목 구성 탭 ===== -->
            <div class="tab-content" id="tabItems" role="tabpanel" aria-labelledby="tab-items">
                <div class="items-header">
                    <div class="section-label-row">
                        <span class="items-tab-title">항목 구성</span>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <span class="colsplit-hint" id="colSplitHint"></span>
                            <button class="btn-toggle-all" id="btnToggleAll" aria-pressed="false">모두 접기</button>
                        </div>
                    </div>
                </div>
                <div class="column-tab-bar" id="columnTabBar" role="tablist" aria-label="컬럼 필터">
                    <button class="col-tab col-tab-active" data-col="all" role="tab" aria-selected="true">전체</button>
                    <button class="col-tab" data-col="left" role="tab" aria-selected="false">좌측 이벤트</button>
                    <button class="col-tab" data-col="right" role="tab" aria-selected="false">우측 이벤트</button>
                </div>
                <div class="items-scroll">
                    <div id="itemsContainer"></div>
                </div>
                <!-- 플로팅 추가 바 -->
                <div class="add-btns-bar">
                    <button class="add-pill-btn add-pill-section" id="addSectionBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="5" rx="1"/><rect x="3" y="10" width="18" height="11" rx="1"/></svg>
                        <span>제목</span>
                    </button>
                    <button class="add-pill-btn add-pill-item" id="addItemBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        <span>항목</span>
                    </button>
                    <button class="add-pill-btn add-pill-col" id="addColumnBreakBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="21"/><polyline points="8 7 3 12 8 17"/><polyline points="16 7 21 12 16 17"/></svg>
                        <span>컬럼</span>
                    </button>
                </div>
            </div>

        </div>

        <!-- ===== 우측 미리보기 패널 ===== -->
        <div class="preview-card glass-card">
            <div class="preview-header">
                <h2>미리보기 <small>(A4 · 2480×3508px)</small></h2>
                <span id="statusChip" class="status-chip"></span>
            </div>
            <div id="previewContainer">
                <div class="placeholder-text" id="placeholder">
                    <p style="font-size:40px;margin-bottom:16px;">📄</p>
                    A4 출력 이미지가 여기에 표시됩니다.<br>
                    <span style="font-size:13px;color:#ABB3BB;">섹션과 항목을 추가해 시작하세요</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 플로팅 리모컨 ===== -->
    <div class="remote-panel" id="remotePanel">
        <button class="rbtn" id="remoteUndo" title="실행취소 (Ctrl+Z)" aria-label="실행취소" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        </button>
        <button class="rbtn" id="remoteRedo" title="다시실행 (Ctrl+Y)" aria-label="다시실행" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
        </button>
        <div class="remote-divider"></div>
        <button class="rbtn rbtn-primary" id="remoteDownload" title="이미지 다운로드 (JPG)" aria-label="이미지 다운로드">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="rbtn rbtn-danger" id="remoteSaveBtn" title="백업 저장 (Ctrl+S)" aria-label="백업 저장">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
        <button class="rbtn" id="remoteLoadBtn" title="백업 불러오기" aria-label="백업 불러오기">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <div class="remote-divider"></div>
        <button class="rbtn" id="remoteGoTop" title="항목 맨 위로" aria-label="항목 맨 위로">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg>
        </button>
        <button class="rbtn" id="remoteGoBottom" title="항목 맨 아래로" aria-label="항목 맨 아래로">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/></svg>
        </button>
        <input type="file" id="loadFileInput" accept=".json" style="display:none">
    </div>

    <script src="main.js?v=20260623h"></script>
</body>
</html>
